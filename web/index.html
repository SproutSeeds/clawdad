<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#842324">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Clawdad">
    <meta property="og:title" content="Clawdad">
    <meta property="og:type" content="website">
    <meta property="og:image" content="/assets/clawdad-mascot-app.png?v=20260406h">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:image" content="/assets/clawdad-mascot-app.png?v=20260406h">
    <title>Clawdad</title>
    <link rel="manifest" href="/manifest.webmanifest?v=20260406h">
    <link rel="apple-touch-icon" href="/assets/clawdad-mascot-app.png?v=20260406h">
    <link rel="icon" href="/assets/clawdad-mascot-app.png?v=20260406h">
    <link rel="stylesheet" href="/app.css?v=20260412b">
  </head>
  <body>
    <main class="app-shell">
      <header class="wordmark-wrap" aria-hidden="true">
        <div class="wordmark-lockup">
          <div class="wordmark">
            <span class="wordmark-line wordmark-line-top" data-text="Claw">Claw</span>
            <span class="wordmark-line wordmark-line-bottom" data-text="Dad">Dad</span>
          </div>
          <button
            id="headerCarouselButton"
            class="mascot-carousel"
            type="button"
            aria-label="Next mascot photo"
          >
            <img
              id="headerCarouselImage"
              class="mascot-photo"
              src="/assets/clawdad-header-01.jpg?v=20260406m"
              loading="eager"
              fetchpriority="high"
              decoding="async"
              alt=""
            >
          </button>
        </div>
        <p id="headerCatchphrase" class="header-catchphrase">"Pass dat clawdad glow, cher"</p>
      </header>

      <form id="dispatchForm" class="composer">
        <label class="sr-only" for="projectSelect">Project</label>
        <label class="sr-only" for="sessionSelect">Session</label>
        <div class="controls">
          <div class="project-control">
            <select id="projectSelect" name="project" disabled>
              <option value="">Loading projects…</option>
            </select>
            <button
              id="projectSummaryButton"
              class="thread-button"
              type="button"
              aria-label="Open project summary"
            >
              <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
                <path d="M4 4.5h8M4 8h8M4 11.5h5.5" stroke="currentColor" stroke-width="1.35" stroke-linecap="round"></path>
              </svg>
            </button>
            <button
              id="projectDelegateButton"
              class="thread-button delegate-open-button"
              type="button"
              aria-label="Open delegate stand-in"
            >
              <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
                <path d="M7.7 13.15c-.65-1.55-.62-3.08.1-4.57.42-.88 1.07-1.66 1.95-2.35" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"></path>
                <path d="M9.85 6.2c.48-2 1.58-3.28 3.3-3.82.45 1.54.1 2.96-1.04 4.25" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"></path>
                <path d="M9.78 6.25c-1.82-.9-3.48-.95-4.95-.14.72 1.6 1.95 2.54 3.67 2.82" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"></path>
                <path d="M10.05 6.45c.88.18 1.7.03 2.46-.45M9.65 6.35c-.58.78-.96 1.64-1.12 2.58" stroke="currentColor" stroke-width="0.85" stroke-linecap="round" opacity=".72"></path>
              </svg>
              <span>Stand In</span>
            </button>
            <button
              id="projectAddButton"
              class="thread-button"
              type="button"
              aria-label="Add project"
            >
              <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
                <path d="M8 3.25v9.5M3.25 8h9.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"></path>
              </svg>
            </button>
            <button
              id="projectArtifactsButton"
              class="thread-button"
              type="button"
              aria-label="Open project files"
              title="Files"
            >
              <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
                <path d="M5 2.75h4.25L12.5 6v7.25H5A1.5 1.5 0 0 1 3.5 11.75v-7.5A1.5 1.5 0 0 1 5 2.75Z" stroke="currentColor" stroke-width="1.25" stroke-linejoin="round"></path>
                <path d="M9.25 2.95V6h3.05M6.25 8.75h3.5M6.25 10.9h2.6" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round"></path>
              </svg>
            </button>
          </div>
          <div class="session-control">
            <select id="sessionSelect" name="session" disabled>
              <option value="">Loading sessions…</option>
            </select>
            <button
              id="sessionImportButton"
              class="thread-button"
              type="button"
              aria-label="Import local Codex session"
            >
              <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
                <path d="M8 3.2v5.6m0 0 2.5-2.5M8 8.8 5.5 6.3M3.4 11.8h9.2" stroke="currentColor" stroke-width="1.35" stroke-linecap="round" stroke-linejoin="round"></path>
              </svg>
              <span id="sessionImportOrb" class="control-orb" hidden aria-hidden="true"></span>
            </button>
            <button
              id="sessionRenameButton"
              class="thread-button"
              type="button"
              aria-label="Rename session"
            >
              <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
                <path d="M10.95 3.05 12.95 5.05M3.75 12.25l2.55-.45 5.8-5.8a1.41 1.41 0 0 0-2-2l-5.8 5.8-.45 2.45Z" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round"></path>
              </svg>
            </button>
            <button
              id="sessionThreadButton"
              class="thread-button"
              type="button"
              aria-label="Open session thread"
            >
              <svg viewBox="0 0 18 18" fill="none" aria-hidden="true">
                <path d="M4.25 5.35c0-1.44 1.18-2.6 2.63-2.6h4.24c1.45 0 2.63 1.16 2.63 2.6v3.3c0 1.44-1.18 2.6-2.63 2.6H8.3l-3.55 2.58.44-2.58H6.88c-1.45 0-2.63-1.16-2.63-2.6z" stroke="currentColor" stroke-width="1.35" stroke-linejoin="round"></path>
              </svg>
            </button>
          </div>
        </div>

        <label class="sr-only" for="messageInput">Message</label>
        <textarea id="messageInput" name="message" rows="6" placeholder="Message"></textarea>

        <button id="dispatchButton" type="submit">
          <span class="button-text">Send</span>
        </button>
      </form>

      <section class="queue" aria-live="polite">
        <div class="queue-headbar">
          <div class="queue-status">
            <div id="mailboxState" class="mailbox-state is-empty"></div>
            <span id="queueUnreadOrb" class="queue-unread-orb" hidden aria-hidden="true"></span>
          </div>
          <button
            id="queueToggle"
            class="queue-toggle"
            type="button"
            aria-expanded="true"
            aria-controls="queueBody"
            aria-label="Collapse queue"
          >
            <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
              <path d="M3.5 6 8 10l4.5-4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"></path>
            </svg>
          </button>
        </div>
        <div id="queueBody" class="queue-body">
          <div id="queueList" class="queue-list"></div>
        </div>
      </section>
    </main>

    <div id="detailModal" class="detail-modal" hidden>
      <button id="detailBackdrop" class="detail-backdrop" type="button" aria-label="Close"></button>
      <section class="detail-panel" role="dialog" aria-modal="true" aria-labelledby="detailProject">
        <div class="detail-head">
          <div class="detail-meta">
            <div id="detailProject" class="detail-project"></div>
            <div id="detailSession" class="detail-session"></div>
          </div>
          <button id="detailClose" class="detail-close" type="button" aria-label="Close">×</button>
        </div>

        <div id="detailHistoryState" class="detail-history-state is-empty"></div>
        <div id="detailHistoryList" class="detail-history-list"></div>
      </section>
    </div>

    <div id="artifactsModal" class="detail-modal" hidden>
      <button id="artifactsBackdrop" class="detail-backdrop" type="button" aria-label="Close"></button>
      <section class="detail-panel project-modal-panel" role="dialog" aria-modal="true" aria-labelledby="artifactsProject">
        <div class="detail-head">
          <div class="detail-meta">
            <div id="artifactsProject" class="detail-project"></div>
            <div id="artifactsRoot" class="detail-session"></div>
          </div>
          <div class="detail-actions">
            <button id="artifactsRefreshButton" class="detail-action-button" type="button">
              <span class="button-text">Refresh</span>
            </button>
            <button id="artifactsClose" class="detail-close" type="button" aria-label="Close">×</button>
          </div>
        </div>

        <div id="artifactsState" class="detail-history-state is-empty"></div>
        <div id="artifactsList" class="detail-history-list artifacts-list"></div>
      </section>
    </div>

    <div id="projectModal" class="detail-modal" hidden>
      <button id="projectModalBackdrop" class="detail-backdrop" type="button" aria-label="Close"></button>
      <section class="detail-panel project-modal-panel" role="dialog" aria-modal="true" aria-labelledby="projectModalTitle">
        <div class="detail-head">
          <div class="detail-meta">
            <div id="projectModalTitle" class="detail-project">Add Project</div>
            <div id="projectModalState" class="detail-session is-empty"></div>
          </div>
          <button id="projectModalClose" class="detail-close" type="button" aria-label="Close">×</button>
        </div>

        <form id="projectModalForm" class="project-modal-form">
          <div class="project-mode-tabs" role="tablist" aria-label="Project mode">
            <button id="projectModeExisting" class="mode-chip" type="button" data-mode="existing">Existing</button>
            <button id="projectModeNew" class="mode-chip" type="button" data-mode="new">New</button>
          </div>

          <label class="sr-only" for="projectRootSelect">Root</label>
          <select id="projectRootSelect" name="root" disabled>
            <option value="">Loading roots…</option>
          </select>

          <label class="sr-only" for="projectRepoSelect">Repo</label>
          <select id="projectRepoSelect" name="repo" disabled>
            <option value="">Choose repo…</option>
          </select>

          <label class="sr-only" for="projectNameInput">Project name</label>
          <input id="projectNameInput" name="projectName" type="text" placeholder="new-project" autocomplete="off" hidden>

          <label class="sr-only" for="projectProviderSelect">Provider</label>
          <select id="projectProviderSelect" name="provider">
            <option value="codex">Codex</option>
            <option value="chimera" disabled>Chimera (coming soon)</option>
          </select>

          <button id="projectCreateButton" type="submit">
            <span class="button-text">Add</span>
          </button>
        </form>
      </section>
    </div>

    <div id="sessionTitleModal" class="detail-modal" hidden>
      <button id="sessionTitleBackdrop" class="detail-backdrop" type="button" aria-label="Close"></button>
      <section class="detail-panel project-modal-panel" role="dialog" aria-modal="true" aria-labelledby="sessionTitleProject">
        <div class="detail-head">
          <div class="detail-meta">
            <div id="sessionTitleProject" class="detail-project"></div>
            <div id="sessionTitleSession" class="detail-session"></div>
          </div>
          <button id="sessionTitleClose" class="detail-close" type="button" aria-label="Close">×</button>
        </div>

        <form id="sessionTitleForm" class="session-title-form">
          <div id="sessionTitleState" class="detail-history-state is-empty"></div>
          <label class="sr-only" for="sessionTitleInput">Session title</label>
          <input id="sessionTitleInput" name="sessionTitle" type="text" placeholder="Thread title" autocomplete="off" maxlength="80">
          <div class="session-title-actions">
            <button id="sessionTitleRemoveButton" class="detail-action-button is-quiet" type="button">
              <span class="button-text">Remove session</span>
            </button>
            <button id="sessionTitleSaveButton" class="detail-action-button" type="submit">
              <span class="button-text">Save</span>
            </button>
          </div>
        </form>
      </section>
    </div>

    <div id="sessionImportModal" class="detail-modal" hidden>
      <button id="sessionImportBackdrop" class="detail-backdrop" type="button" aria-label="Close"></button>
      <section class="detail-panel project-modal-panel" role="dialog" aria-modal="true" aria-labelledby="sessionImportProject">
        <div class="detail-head">
          <div class="detail-meta">
            <div id="sessionImportProject" class="detail-project"></div>
            <div id="sessionImportState" class="detail-session"></div>
          </div>
          <button id="sessionImportClose" class="detail-close" type="button" aria-label="Close">×</button>
        </div>

        <div id="sessionImportList" class="detail-history-list import-session-list"></div>
      </section>
    </div>

    <div id="summaryModal" class="detail-modal" hidden>
      <button id="summaryBackdrop" class="detail-backdrop" type="button" aria-label="Close"></button>
      <section class="detail-panel project-modal-panel" role="dialog" aria-modal="true" aria-labelledby="summaryProject">
        <div class="detail-head">
          <div class="detail-meta">
            <div id="summaryProject" class="detail-project"></div>
            <div id="summarySession" class="detail-session"></div>
          </div>
          <div class="detail-actions">
            <button id="summaryRefreshButton" class="detail-action-button" type="button">
              <span class="button-text">New summary</span>
            </button>
            <button id="summaryClose" class="detail-close" type="button" aria-label="Close">×</button>
          </div>
        </div>

        <div id="summaryState" class="detail-history-state is-empty"></div>
        <div id="summaryList" class="detail-history-list summary-list"></div>
      </section>
    </div>

    <div id="delegateModal" class="detail-modal" hidden>
      <button id="delegateBackdrop" class="detail-backdrop" type="button" aria-label="Close"></button>
      <section class="detail-panel project-modal-panel" role="dialog" aria-modal="true" aria-labelledby="delegateProject">
        <div class="detail-head">
          <div class="detail-meta">
            <div id="delegateProject" class="detail-project"></div>
            <div id="delegateSession" class="detail-session"></div>
          </div>
          <div class="detail-actions">
            <button id="delegateSaveButton" class="detail-action-button" type="button">
              <span class="button-text">Save</span>
            </button>
            <button id="delegatePlanButton" class="detail-action-button" type="button">
              <span class="button-text">Plan</span>
            </button>
            <button id="delegateRunButton" class="detail-action-button" type="button">
              <span class="button-text">Stand In</span>
            </button>
            <button id="delegateSummaryButton" class="detail-action-button detail-action-icon" type="button" aria-label="Summarize delegate run" title="Summarize delegate run">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M5 4.5h14a1.5 1.5 0 0 1 1.5 1.5v9.4a1.5 1.5 0 0 1-1.5 1.5H9.4L5 20.5v-3.6A1.5 1.5 0 0 1 3.5 15.4V6A1.5 1.5 0 0 1 5 4.5Z" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/>
                <path d="M8 8.5h8M8 12h5.6" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
              </svg>
            </button>
            <button id="delegateClose" class="detail-close" type="button" aria-label="Close">×</button>
          </div>
        </div>

        <div id="delegateState" class="detail-history-state is-empty"></div>
        <div class="delegate-run-head">
          <span>Run log</span>
          <span id="delegateRunMeta"></span>
        </div>
        <div id="delegateRunList" class="detail-history-list delegate-run-list"></div>
        <div id="delegateSummaryList" class="detail-history-list summary-list delegate-summary-list"></div>
        <textarea id="delegateBriefInput" class="delegate-brief-input" rows="12" placeholder="North star, objective, gates…"></textarea>
        <div id="delegatePlanList" class="detail-history-list summary-list delegate-plan-list"></div>
      </section>
    </div>

    <script type="module" src="/app.js?v=20260412b"></script>
  </body>
</html>
